<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify QR Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1DB954;
  --black: #0a0a0a;
  --card: #141414;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --muted: #888;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--black);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(29,185,84,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,185,84,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}
header {
  width:100%;
  max-width:600px;
  padding:32px 24px 0;
  position:relative;
  z-index:1;
}
.logo { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
.logo-icon {
  width:36px; height:36px;
  background:var(--green);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow:0 0 20px rgba(29,185,84,0.4); }
  50% { box-shadow:0 0 40px rgba(29,185,84,0.8); }
}
h1 { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
.subtitle { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-left:48px; }
main {
  width:100%; max-width:600px;
  padding:24px;
  position:relative; z-index:1;
  display:flex; flex-direction:column; gap:20px;
}

/* Scanner */
.scanner-wrap {
  position:relative;
  width:100%; aspect-ratio:1/1;
  border-radius:16px; overflow:hidden;
  background:#111;
  border:1px solid var(--border);
}
#video { width:100%; height:100%; object-fit:cover; display:block; }
#canvas { display:none; }
.scanner-overlay { position:absolute; inset:0; pointer-events:none; }
.corner { position:absolute; width:28px; height:28px; border-color:var(--green); border-style:solid; }
.corner.tl { top:20px; left:20px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
.corner.tr { top:20px; right:20px; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
.corner.bl { bottom:20px; left:20px; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
.corner.br { bottom:20px; right:20px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
.scan-line {
  position:absolute; left:20px; right:20px; height:2px;
  background:linear-gradient(90deg, transparent, rgba(29,185,84,0.6), var(--green), rgba(29,185,84,0.6), transparent);
  animation:scanMove 2.5s ease-in-out infinite;
  box-shadow:0 0 8px var(--green);
}
@keyframes scanMove {
  0% { top:20px; opacity:0; }
  10% { opacity:1; }
  90% { opacity:1; }
  100% { top:calc(100% - 20px); opacity:0; }
}
.scan-hint {
  position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
  font-size:11px; color:rgba(255,255,255,0.5); letter-spacing:1.5px;
  text-transform:uppercase; white-space:nowrap;
  background:rgba(0,0,0,0.5); padding:4px 12px; border-radius:20px;
}

/* Buttons */
.btn-start {
  width:100%; padding:16px;
  background:var(--green); color:#000;
  border:none; border-radius:12px;
  font-family:'Syne',sans-serif; font-size:15px; font-weight:800;
  cursor:pointer; transition:all 0.2s;
}
.btn-start:hover { background:#22d460; transform:translateY(-1px); box-shadow:0 8px 24px rgba(29,185,84,0.3); }

.upload-label {
  display:block; text-align:center;
  font-size:12px; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase;
  cursor:pointer; padding:12px;
  border:1px dashed var(--border); border-radius:12px;
  transition:all 0.2s;
}
.upload-label:hover { border-color:var(--green); color:var(--green); }

/* Status */
.status-badge {
  display:inline-flex; align-items:center; gap:8px;
  font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--muted); padding:6px 14px;
  border:1px solid var(--border); border-radius:20px;
  transition:all 0.3s;
}
.status-badge.active { color:var(--green); border-color:var(--green); background:rgba(29,185,84,0.08); }
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition:all 0.3s; }
.status-badge.active .status-dot { background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Loading */
.loading { text-align:center; padding:32px; display:none; }
.loading.visible { display:block; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { font-size:12px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; }

/* Error */
.error-msg {
  background:rgba(255,60,60,0.08); border:1px solid rgba(255,60,60,0.3);
  border-radius:12px; padding:16px 20px;
  font-size:12px; color:#ff6060;
  white-space:pre-line; line-height:1.7;
  display:none;
}
.error-msg.visible { display:block; }

/* Song card */
.song-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; overflow:hidden;
  display:none;
  animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
}
.song-card.visible { display:block; }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.song-header { display:flex; gap:16px; padding:20px; align-items:center; border-bottom:1px solid var(--border); }
.album-art { width:80px; height:80px; border-radius:8px; object-fit:cover; flex-shrink:0; background:var(--border); }
.song-main { flex:1; min-width:0; }
.song-name { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-artist { font-size:13px; color:var(--green); margin:3px 0 6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-album { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.song-footer {
  padding:12px 20px 16px; border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.open-btn {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--green); color:#000; text-decoration:none;
  padding:8px 16px; border-radius:8px;
  font-family:'Syne',sans-serif; font-size:12px; font-weight:800;
  transition:all 0.2s;
}
.open-btn:hover { background:#22d460; }
.scan-again-btn {
  background:transparent; border:1px solid var(--border); color:var(--muted);
  padding:8px 16px; border-radius:8px;
  font-family:'Space Mono',monospace; font-size:11px;
  cursor:pointer; transition:all 0.2s; letter-spacing:1px;
}
.scan-again-btn:hover { border-color:var(--text); color:var(--text); }

/* History */
.history-title {
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.history-title::after { content:''; flex:1; height:1px; background:var(--border); }
.history-list { display:flex; flex-direction:column; gap:8px; }
.history-item {
  display:flex; align-items:center; gap:12px;
  padding:10px 12px; background:var(--card);
  border:1px solid var(--border); border-radius:10px;
  cursor:pointer; transition:all 0.2s; text-decoration:none; color:inherit;
}
.history-item:hover { border-color:var(--green); background:rgba(29,185,84,0.05); }
.history-thumb { width:40px; height:40px; border-radius:6px; object-fit:cover; background:var(--border); flex-shrink:0; }
.history-info { flex:1; min-width:0; }
.history-name { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.history-artist { font-size:11px; color:var(--muted); }
.history-num { font-size:10px; color:var(--muted); flex-shrink:0; }

footer { padding:24px; font-size:10px; color:#444; letter-spacing:1px; text-align:center; position:relative; z-index:1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">♫</div>
    <h1>SPOTIFY QR SCANNER</h1>
  </div>
  <div class="subtitle">Scanna en Spotify QR-kod</div>
</header>

<main>
  <div class="scanner-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="scanner-overlay">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>
      <div class="scan-hint">HÅLL KAMERAN STILL</div>
    </div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
    <div class="status-badge" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">AV</span>
    </div>
    <button class="btn-start" id="startBtn" onclick="startCamera()">▶ Starta Kamera</button>
  </div>

  <label class="upload-label" for="imgInput">
    📁 Eller ladda upp en bild av QR-koden
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="scanImage(event)">
  </label>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Hämtar låtinfo…</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="song-card" id="songCard">
    <div class="song-header">
      <img class="album-art" id="albumArt" src="" alt="">
      <div class="song-main">
        <div class="song-name" id="songName">—</div>
        <div class="song-artist" id="songArtist">—</div>
        <div class="song-album" id="songAlbum">—</div>
      </div>
    </div>
    <div id="spotifyEmbed" style="padding:0 16px 8px"></div>
    <div class="song-footer">
      <button class="scan-again-btn" onclick="resumeCamera()">↩ Scanna igen</button>
      <a class="open-btn" id="openSpotify" href="#" target="_blank">♫ Öppna i Spotify</a>
    </div>
  </div>

  <div id="historySection" style="display:none">
    <div class="history-title">Scannrade låtar</div>
    <div class="history-list" id="historyList"></div>
  </div>
</main>

<footer>Inget login krävs · Spotify oEmbed API · Fungerar med vanliga QR-koder</footer>

<script>
// ── State ─────────────────────────────────────────────────────────
let videoEl = document.getElementById('video');
let canvasEl = document.getElementById('canvas');
let ctx = canvasEl.getContext('2d', { willReadFrequently: true });
let stream = null;
let scanning = false;
let tickId = null;
let lastId = null;
let history = [];

// ── Spotify fetch via oEmbed ──────────────────────────────────────
async function fetchTrack(trackId) {
  const trackUrl = `https://open.spotify.com/track/${trackId}`;
  const url = `https://open.spotify.com/oembed?url=${encodeURIComponent(trackUrl)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const d = await res.json();
  // Parse "Song Name · Artist Name" from title
  let name = d.title || 'Okänd';
  let artist = '—';
  if (d.title && d.title.includes(' · ')) {
    const parts = d.title.split(' · ');
    name = parts[0].trim();
    artist = parts.slice(1).join(' · ').trim();
  }
  return { trackId, name, artist, thumbnail: d.thumbnail_url || '', url: trackUrl };
}

// ── Extract Spotify track ID ──────────────────────────────────────
function getTrackId(text) {
  if (!text) return null;
  const m1 = text.match(/open\.spotify\.com\/track\/([A-Za-z0-9]+)/);
  if (m1) return m1[1];
  const m2 = text.match(/spotify:track:([A-Za-z0-9]+)/);
  if (m2) return m2[1];
  return null;
}

// ── Camera start ──────────────────────────────────────────────────
async function startCamera() {
  setStatus('STARTAR…', false);
  hideError();

  if (!navigator.mediaDevices?.getUserMedia) {
    showError('Din webbläsare stöder inte kamera.\nÖppna i Chrome.');
    return;
  }

  // Try different constraints — important for OnePlus/Android
  const tries = [
    { video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 } } },
    { video: { facingMode: 'environment', width: { ideal: 1280 } } },
    { video: { facingMode: 'environment' } },
    { video: { width: { ideal: 1280 } } },
    { video: true }
  ];

  for (const constraints of tries) {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      break;
    } catch(e) {
      stream = null;
    }
  }

  if (!stream) {
    setStatus('FEL', false);
    showError('Kameran kunde inte startas.\n\n• Tillåt kamera för denna sida i Chrome\n• Stäng andra appar som kan använda kameran\n• Ladda om sidan och försök igen');
    document.getElementById('startBtn').style.display = '';
    return;
  }

  videoEl.srcObject = stream;
  videoEl.muted = true;
  videoEl.playsInline = true;

  await new Promise(resolve => {
    videoEl.onloadedmetadata = resolve;
    videoEl.oncanplay = resolve;
    setTimeout(resolve, 3000); // fallback
  });

  try { await videoEl.play(); } catch(e) {}

  document.getElementById('startBtn').style.display = 'none';
  setStatus('SCANNAR', true);
  scanning = true;
  lastId = null;

  // Use setInterval for reliable scanning on Android
  if (tickId) clearInterval(tickId);
  tickId = setInterval(scanFrame, 150);
}

// ── Scan one frame from camera ────────────────────────────────────
function scanFrame() {
  if (!scanning) return;
  if (!videoEl || videoEl.paused || videoEl.videoWidth === 0) return;

  try {
    // Crop center square for better detection
    const vw = videoEl.videoWidth;
    const vh = videoEl.videoHeight;
    const size = Math.min(vw, vh);
    const sx = (vw - size) / 2;
    const sy = (vh - size) / 2;

    canvasEl.width = size;
    canvasEl.height = size;
    ctx.drawImage(videoEl, sx, sy, size, size, 0, 0, size, size);

    const imgData = ctx.getImageData(0, 0, size, size);
    const result = jsQR(imgData.data, size, size, { inversionAttempts: 'attemptBoth' });

    if (result?.data) {
      const id = getTrackId(result.data);
      if (id && id !== lastId) {
        lastId = id;
        scanning = false;
        clearInterval(tickId);
        handleFound(id);
      }
    }
  } catch(e) {}
}

// ── Scan uploaded image ───────────────────────────────────────────
function scanImage(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;

  hideError();
  showLoading();
  setStatus('LÄSER BILD…', true);

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Try multiple resolutions
      const resolutions = [
        { w: img.width, h: img.height },
        { w: 800, h: Math.round(img.height * 800 / img.width) },
        { w: 400, h: Math.round(img.height * 400 / img.width) },
        { w: 1200, h: Math.round(img.height * 1200 / img.width) }
      ];

      let found = false;
      for (const res of resolutions) {
        const c = document.createElement('canvas');
        c.width = res.w; c.height = res.h;
        const cx = c.getContext('2d');
        cx.drawImage(img, 0, 0, res.w, res.h);
        const imgData = cx.getImageData(0, 0, res.w, res.h);
        const result = jsQR(imgData.data, res.w, res.h, { inversionAttempts: 'attemptBoth' });

        if (result?.data) {
          const id = getTrackId(result.data);
          hideLoading();
          if (id) {
            found = true;
            handleFound(id);
          } else {
            found = true;
            setStatus('FEL', false);
            showError('QR-koden lästes men är inte en Spotify-låtlänk.\n\nKontrollera att du använder en QR-kod som pekar på en Spotify-låt.');
          }
          break;
        }
      }

      if (!found) {
        hideLoading();
        setStatus('INGEN KOD', false);
        showError('Hittade ingen QR-kod i bilden.\n\nTips:\n• Hela QR-koden måste synas i bilden\n• Bilden måste vara skarp och välbelyst\n• Det ska vara vit kant runt QR-koden\n• Prova att ta en ny screenshot och ladda upp igen');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Handle found track ID ─────────────────────────────────────────
async function handleFound(trackId) {
  setStatus('HITTAD!', true);
  showLoading();
  hideSongCard();

  try {
    const track = await fetchTrack(trackId);
    hideLoading();
    showTrack(track);
  } catch(e) {
    hideLoading();
    setStatus('FEL', false);
    showError('Kunde inte hämta låtinfo.\nKontrollera internetanslutningen och försök igen.\n\nFel: ' + e.message);
  }
}

// ── Show track info ───────────────────────────────────────────────
function showTrack(track) {
  document.getElementById('songName').textContent = track.name;
  document.getElementById('songArtist').textContent = track.artist;
  document.getElementById('songAlbum').textContent = '—';
  document.getElementById('albumArt').src = track.thumbnail;
  document.getElementById('openSpotify').href = track.url;

  // Spotify embed player
  document.getElementById('spotifyEmbed').innerHTML =
    `<iframe src="https://open.spotify.com/embed/track/${track.trackId}"
      width="100%" height="80" frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      style="border-radius:8px;margin-top:4px;display:block">
    </iframe>`;

  document.getElementById('songCard').classList.add('visible');
  setStatus('LÅT HITTAD ✓', true);
  addHistory(track);
}

// ── Resume camera ─────────────────────────────────────────────────
function resumeCamera() {
  hideSongCard();
  hideError();
  lastId = null;
  // If stream is still alive, just restart scanning
  if (stream && stream.active) {
    scanning = true;
    setStatus('SCANNAR', true);
    if (tickId) clearInterval(tickId);
    tickId = setInterval(scanFrame, 150);
  } else {
    // Restart camera fully
    startCamera();
  }
}

// ── History ───────────────────────────────────────────────────────
function addHistory(track) {
  history = history.filter(h => h.trackId !== track.trackId);
  history.unshift(track);
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (!history.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.map((h, i) => `
    <a class="history-item" href="${h.url}" target="_blank">
      <img class="history-thumb" src="${h.thumbnail}" alt="">
      <div class="history-info">
        <div class="history-name">${h.name}</div>
        <div class="history-artist">${h.artist}</div>
      </div>
      <div class="history-num">#${i+1}</div>
    </a>
  `).join('');
}

// ── UI helpers ────────────────────────────────────────────────────
function setStatus(text, active) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusBadge').classList.toggle('active', active);
}
function showLoading() { document.getElementById('loading').classList.add('visible'); }
function hideLoading() { document.getElementById('loading').classList.remove('visible'); }
function hideSongCard() { document.getElementById('songCard').classList.remove('visible'); }
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }
</script>
</body>
</html>
